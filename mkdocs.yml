site_name: Kho Từ Vựng Memrise

theme:
  name: material
  palette:
    primary: white
    accent: blue
  font:
    text: Helvetica Neue, Helvetica, Arial, sans-serif
  features:
    #  - navigation.instant
      - navigation.footer
    #  - search.suggest     # Bật tính năng tự động gợi ý từ khóa khi đang gõ
    #  - search.highlight   # Bôi vàng từ khóa trong bài học
  
nav:
  - Trang chủ: index.md
  - Từ vựng theo chủ đề:

    - 🍔 Ăn uống & Nhà hàng:
      - Chủ đề Ăn uống:
        - Tổng hợp chủ đề Ăn uống: Nhà hàng & Ăn uống/Đồ ăn/Tổng hợp ăn uống.md
        - Bài 1. Đồ ăn: Nhà hàng & Ăn uống/Đồ ăn/Đồ ăn.md
        - Bài 2. Nhiều đồ ăn hơn: Nhà hàng & Ăn uống/Đồ ăn/Nhiều đồ ăn hơn.md
      - Chủ đề Nhà hàng:
        - Tổng hợp chủ đề Nhà hàng: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng.md
        - Bài 1. Ở nhà hàng 1: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 1.md
        - Bài 2. Ở nhà hàng 2: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 2.md
        - Bài 3. Ở nhà hàng 3: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 3.md
        - Bài 4. Ở nhà hàng 4: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 4.md
        - Bài 5. Ở nhà hàng 5: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 5.md
        - Bài 6. Ở nhà hàng 6: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 6.md

    - 🛒 Mua sắm & Cửa hàng:
      - Chủ đề Nhịp sống đô thị:
        - Tổng hợp chủ đề Nhịp sống đô thị: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố.md
        - Bài 1. Các cửa hàng trong khu phố 1 : Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/015. Các cửa hàng trong khu phố 1 (17 từ).md
        - Bài 2. Các cửa hàng trong khu phố 2: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/032. Các cửa hàng trong khu phố 2 (27 từ).md
        - Bài 3. Các cửa hàng trong khu phố 3: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố 3.md
        - Bài 4. Các cửa hàng trong khu phố 4: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố 4.md
        - Bài 5. Các cửa hàng trong khu phố 5: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố 5.md
      - Chủ đề Mua sắm:
        - Tổng hợp chủ đề Mua sắm: Mua sắm & Cửa hàng/Mua sắm/Mua sắm.md

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/custom.js
  
# Thêm khối plugins này vào (nếu chưa có)
plugins:
  - search
  - macros
  - glightbox
