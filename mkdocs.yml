site_name: Kho Từ Vựng Memrise

theme:
  name: material
  palette:
    primary: white
    accent: blue
  font:
    text: Helvetica Neue, Helvetica, Arial, sans-serif
  features:
      - navigation.instant
      - navigation.footer
  
nav:
  - Trang chủ: index.md
  - Từ vựng theo chủ đề:
    - 🍔 Nhà hàng & Ăn uống:
      - Từ vựng chủ đề Ăn uống: Nhà hàng & Ăn uống/Đồ ăn/Tổng hợp ăn uống.md
      - Đồ ăn: Nhà hàng & Ăn uống/Đồ ăn/Đồ ăn.md
      - Nhiều đồ ăn hơn: Nhà hàng & Ăn uống/Đồ ăn/Nhiều đồ ăn hơn.md
      - Từ vựng chủ đề Nhà hàng: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng.md
      - Ở nhà hàng 1: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 1.md
      - Ở nhà hàng 2: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 2.md
      - Ở nhà hàng 3: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 3.md
      - Ở nhà hàng 4: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 4.md
      - Ở nhà hàng 5: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 5.md
      - Ở nhà hàng 6: Nhà hàng & Ăn uống/Ở nhà hàng/Ở nhà hàng 6.md
    - 🛒 Mua sắm & Cửa hàng:
      - Từ vựng chủ đề Cửa hàng: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố.md
      - Các cửa hàng trong khu phố 1 : Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/015. Các cửa hàng trong khu phố 1 (17 từ).md
      - Các cửa hàng trong khu phố 2: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/032. Các cửa hàng trong khu phố 2 (27 từ).md
      - Các cửa hàng trong khu phố 3: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố 3.md
      - Các cửa hàng trong khu phố 4: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố 4.md
      - Các cửa hàng trong khu phố 5: Mua sắm & Cửa hàng/Các cửa hàng trong khu phố/Các cửa hàng trong khu phố 5.md

extra_css:
  - stylesheets/custom.css
  
# Thêm khối plugins này vào (nếu chưa có)
plugins:
  - search
  - macros
  - glightbox

# Thêm file JS vào cùng chỗ với extra_css
extra_javascript:
  - javascripts/custom.js
